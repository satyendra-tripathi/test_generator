{% extends 'base.html' %}

{% block title %}Login - QuizGenius{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-panel">
        <h2>Welcome Back</h2>
        <p>Please login to your account</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
        <p class="auth-footer" style="font-size: 0.8em; margin-top: 1rem; opacity: 0.8;">Admin: admin/admin123 | User: testuser/user123</p>
    </div>
</div>
{% endblock %}
